<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Relações de Jimjar</title>
    <link rel="stylesheet" href="../css/npcs_shared.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        body { font-family: 'Lora', serif; padding: 20px; background-color: #121212; color: #fff; }
        .adm-container { max-width: 800px; margin: 0 auto; }
        .card { position: relative; padding: 20px; margin-bottom: 15px; border-radius: 6px; background: #1a1a1a; border: 1px solid #333; }
        .card-danger { border-left: 5px solid #ff4d4d; }
        
        /* Container para alinhar os botões no topo direito */
        .acoes-container { position: absolute; right: 15px; top: 15px; display: flex; gap: 8px; }
        
        .btn-acao { background: #444; color: #fff; border: none; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-family: 'Lora', serif; }
        .btn-acao:hover { background: #666; }
        .btn-apagar { background: #cc2424; }
        .btn-apagar:hover { background: #ff3333; }
        
        .btn-salvar-tudo { display: block; width: 100%; background: #28a745; color: white; padding: 12px; text-align: center; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .btn-salvar-tudo:hover { background: #218838; }
        textarea { width: 100%; height: 60px; background: #2b2b2b; color: #fff; border: 1px solid #555; padding: 5px; margin-top: 10px; resize: vertical; font-family: 'Lora', serif; }
        .voltar-link { color: #aaa; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .voltar-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="adm-container">
        <a href="jimjar.html" class="voltar-link">← Voltar para a página do Jimjar</a>
        <h1>Painel de Administração - Relações (Jimjar)</h1>
        <p>Clique em "Editar" para alterar o texto ou "Apagar" para remover a relação. Depois clique no botão verde no final para aplicar e salvar.</p>
        
        <hr style="border-color: #333; margin-bottom: 20px;">

        <div id="adm-lista-relacoes"></div>

        <button class="btn-salvar-tudo" onclick="salvarAlteracoesNoStorage()">💾 Salvar Todas as Alterações</button>
    </div>

    <script>
        const relacoesPadrao = {
            "Apolo": { texto: '"Não vi nada de interessante com ele, mas aposto que ele carrega algum segredo que nem ele conhece.. Sou bem sensitivo, sabe?"', classe: "card card-danger", tipo: "pj-name" },
            "Atena VII": { texto: '"Essa coroa reconhece um cara dominante quando vê um. Assim que ela me viu o coração já disparou no papai e ela fez questão de me designar como CAPITÃO DOS BARRELAS. Topsy e Turvy, aposto que posso liderar vocês!"', classe: "card card-danger", tipo: "pj-name" },
            "Fane": { texto: '"Era bem apegado à Eldeth. Espero que, agora que ela se foi, o tio aceite apostar esse escudo eventualmente."', classe: "card card-danger", tipo: "pj-name" },
            "Príncipe Derendil": { texto: '"Aposto que ele não vai conseguir voltar a sua forma élfica... Já era, tio!"', classe: "card", tipo: "npc-name" },
            "Ront": { texto: '"Esse deve valer uma boa aposta de carteado."', classe: "card", tipo: "npc-name" },
            "Rudeus": { texto: '"Esse tio é bem forte, aposto que será o único sobrevivente no fim disso tudo."', classe: "card card-danger", tipo: "pj-name" },
            "Stool": { texto: '"Aposto que vai ser o próximo a morrer.."', classe: "card", tipo: "npc-name" },
            "Topsy & Turvy": { texto: '"Esses dois tem algo muito sombrio a esconder.. E eu não sei o que é.."', classe: "card", tipo: "npc-name" },
            "Vaal": { texto: '"Eu não sei o que ele tem de especial, mas é IMPOSSÍVEL ele perder alguma aposta.. Esse tio esconde algum segredo, e eu vou descobrir qual é.."', classe: "card card-danger", tipo: "pj-name" }
        };

        let relacoesAtuais = {};

        function carregarInterface() {
            const container = document.getElementById('adm-lista-relacoes');
            const dadosSalvos = localStorage.getItem('jimjar_relacoes');
            
            if (Object.keys(relacoesAtuais).length === 0) {
                relacoesAtuais = dadosSalvos ? JSON.parse(dadosSalvos) : JSON.parse(JSON.stringify(relacoesPadrao));
            }

            container.innerHTML = '';
            
            Object.keys(relacoesAtuais).forEach((nome, index) => {
                const info = relacoesAtuais[nome];
                container.innerHTML += `
                    <div class="${info.classe}" id="card-${index}">
                        <div class="acoes-container">
                            <button class="btn-acao" onclick="toggleEditar('${nome}', ${index})">Editar</button>
                            <button class="btn-acao btn-apagar" onclick="apagarRelacao('${nome}')">Apagar</button>
                        </div>
                        <span class="${info.tipo}" style="font-weight:bold; font-size:18px;">${nome}</span>
                        <p id="texto-${index}">${info.texto}</p>
                    </div>
                `;
            });
        }

        function toggleEditar(nome, index) {
            const pElement = document.getElementById(`texto-${index}`);
            const botao = document.querySelector(`#card-${index} .btn-acao`);

            if (botao.textContent === "Editar") {
                const textoAtual = relacoesAtuais[nome].texto;
                pElement.innerHTML = `<textarea id="input-${index}">${textoAtual}</textarea>`;
                botao.textContent = "OK";
                botao.style.background = "#007bff";
            } else {
                const novoTexto = document.getElementById(`input-${index}`).value;
                relacoesAtuais[nome].texto = novoTexto;
                pElement.innerHTML = novoTexto;
                botao.textContent = "Editar";
                botao.style.background = "#444";
            }
        }

        function apagarRelacao(nome) {
            if (confirm(`Tem certeza que deseja remover permanentemente a relação com ${nome}?`)) {
                delete relacoesAtuais[nome];
                carregarInterface();
            }
        }

        function salvarAlteracoesNoStorage() {
            Object.keys(relacoesAtuais).forEach((nome, index) => {
                const input = document.getElementById(`input-${index}`);
                if (input) {
                    relacoesAtuais[nome].texto = input.value;
                }
            });

            localStorage.setItem('jimjar_relacoes', JSON.stringify(relacoesAtuais));
            alert('Relações modificadas de Jimjar salvas com sucesso!');
            window.location.href = 'jimjar.html';
        }

        window.onload = carregarInterface;
    </script>
</body>
</html>
